name: deploy-branch-preview

on:
  push:
    branches-ignore:
      - main
  workflow_run:
    workflows:
      - deploy-book
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      triggered_by_main_sync:
        description: "True when triggered from a main branch sync"
        required: false
        type: boolean
        default: false
      target_branch:
        description: "Branch to build preview for when manually/dispatched from main sync"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  actions: write

concurrency:
  group: preview-${{ inputs.target_branch != '' && inputs.target_branch || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  sync-previews-from-main:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger preview rebuild on every non-main branch
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'branch-preview.yml';
            const defaultBranch = context.payload.repository.default_branch;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            const targets = branches
              .map((branch) => branch.name)
              .filter((name) => name !== defaultBranch && name !== 'gh-pages');

            core.info(`Triggering ${targets.length} branch preview rebuild(s).`);

            for (const branch of targets) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref: defaultBranch,
                inputs: {
                  triggered_by_main_sync: 'true',
                  target_branch: branch,
                },
              });
              core.info(`Dispatched preview rebuild for ${branch}`);
            }

  deploy-preview:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch != '' && inputs.target_branch || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TOC script dependencies
        run: npm install js-yaml

      - name: Update TOC from docs tree (preview only)
        run: node .github/scripts/update-toc.js

      - name: Build chatbot docs index (preview)
        run: node .github/scripts/build-docs-chat-index.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r ./docs/requirements.txt

      - name: Build the book
        run: jupyter-book build ./docs

      - name: Create safe branch slug
        id: branch
        shell: bash
        run: |
          branch_name="${{ inputs.target_branch != '' && inputs.target_branch || github.ref_name }}"
          slug="${branch_name}"
          slug="${slug//\//-}"
          slug="${slug// /-}"
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"

      - name: Deploy branch preview to gh-pages/previews/<branch>
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs/_build/html
          destination_dir: previews/${{ steps.branch.outputs.slug }}
          keep_files: true

      - name: Print preview URL
        run: |
          echo "Preview URL (${{ steps.branch.outputs.branch_name }}): https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/${{ steps.branch.outputs.slug }}/"

      - name: Update README preview quick links on default branch
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository.default_branch;
            const readmePath = 'README.MD';

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            const previewBranches = branches
              .map((branch) => branch.name)
              .filter((name) => name !== defaultBranch && name !== 'gh-pages')
              .sort((a, b) => a.localeCompare(b));

            const baseUrl = `https://${owner}.github.io/${repo}/previews`;
            const lines = previewBranches.map((branch) => {
              const slug = branch.replaceAll('/', '-').replaceAll(' ', '-');
              const encodedBranch = encodeURIComponent(branch);
              return `- [${branch}](${baseUrl}/${slug}/) - branch: ${encodedBranch}`;
            });

            const block = [
              '<!-- PREVIEW_LINKS_START -->',
              '## Branch Preview Quick Links',
              '',
              lines.length > 0 ? lines.join('\n') : '_No branch previews found yet._',
              '<!-- PREVIEW_LINKS_END -->',
            ].join('\n');

            const markerRegex = /<!-- PREVIEW_LINKS_START -->[\s\S]*?<!-- PREVIEW_LINKS_END -->/m;

            for (let attempt = 1; attempt <= 5; attempt += 1) {
              const readme = await github.rest.repos.getContent({
                owner,
                repo,
                path: readmePath,
                ref: defaultBranch,
              });

              if (!('content' in readme.data) || !readme.data.content) {
                throw new Error('README content was not returned by GitHub API.');
              }

              const current = Buffer.from(readme.data.content, 'base64').toString('utf8');
              const updated = markerRegex.test(current)
                ? current.replace(markerRegex, block)
                : `${current.trimEnd()}\n\n${block}\n`;

              if (updated === current) {
                core.info('README preview links are already up to date.');
                return;
              }

              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: readmePath,
                  message: 'chore: update preview quick links in README',
                  content: Buffer.from(updated, 'utf8').toString('base64'),
                  sha: readme.data.sha,
                  branch: defaultBranch,
                });

                core.info('README preview links updated successfully.');
                return;
              } catch (error) {
                if (error.status === 409 && attempt < 5) {
                  core.warning(`README update conflict on attempt ${attempt}; retrying.`);
                  continue;
                }
                throw error;
              }
            }

            throw new Error('Failed to update README after multiple conflict retries.');