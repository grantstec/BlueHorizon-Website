name: deploy-branch-preview

on:
  push:
    branches-ignore:
      - main
  workflow_run:
    workflows:
      - deploy-book
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      triggered_by_main_sync:
        description: "True when triggered from a main branch sync"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: preview-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  sync-previews-from-main:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger preview rebuild on every non-main branch
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'branch-preview.yml';

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            const targets = branches
              .map((branch) => branch.name)
              .filter((name) => name !== 'main' && name !== 'gh-pages');

            core.info(`Triggering ${targets.length} branch preview rebuild(s).`);

            for (const branch of targets) {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref: branch,
                inputs: {
                  triggered_by_main_sync: 'true',
                },
              });
              core.info(`Dispatched preview rebuild for ${branch}`);
            }

  deploy-preview:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TOC script dependencies
        run: npm install js-yaml

      - name: Update TOC from docs tree (preview only)
        run: node .github/scripts/update-toc.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r ./docs/requirements.txt

      - name: Build the book
        run: jupyter-book build ./docs

      - name: Create safe branch slug
        id: branch
        shell: bash
        run: |
          slug="${GITHUB_REF_NAME}"
          slug="${slug//\//-}"
          slug="${slug// /-}"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"

      - name: Deploy branch preview to gh-pages/previews/<branch>
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs/_build/html
          destination_dir: previews/${{ steps.branch.outputs.slug }}
          keep_files: true

      - name: Print preview URL
        run: |
          echo "Preview URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/${{ steps.branch.outputs.slug }}/"