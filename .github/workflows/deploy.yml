name: deploy-book

on:
  push:
    branches:
      - main  # or your default branch name

permissions:
  contents: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TOC script dependencies
        run: npm install js-yaml

      - name: Update TOC from docs tree
        run: node .github/scripts/update-toc.js

      - name: Commit TOC changes
        run: |
          if git diff --quiet -- docs/_toc.yml; then
            echo "No TOC changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/_toc.yml
            git commit -m "chore: auto-update docs toc [skip ci]"
            git push
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r ./docs/requirements.txt

      - name: Build the book
        run: |
          jupyter-book build ./docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
