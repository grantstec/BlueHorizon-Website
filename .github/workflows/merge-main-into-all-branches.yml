name: merge-main-into-all-branches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-main-into-all:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main into every non-main branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch --all --prune

          mapfile -t branches < <(git for-each-ref --format='%(refname:short)' refs/remotes/origin | sed 's#^origin/##' | grep -v '^HEAD$' | grep -v '^main$' | grep -v '^gh-pages$' | sort -u)

          if [ ${#branches[@]} -eq 0 ]; then
            echo "No non-main branches found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          success=()
          failed=()

          for branch in "${branches[@]}"; do
            echo "--- Updating $branch ---"
            git checkout -B "$branch" "origin/$branch"

            if git merge --no-ff --no-edit origin/main; then
              git push origin "$branch"
              success+=("$branch")
            else
              git merge --abort || true
              failed+=("$branch")
            fi
          done

          {
            echo "## Merge Main Into All Branches"
            echo
            echo "Successful branches (${#success[@]}):"
            for b in "${success[@]}"; do echo "- $b"; done
            echo
            echo "Branches with conflicts (${#failed[@]}):"
            for b in "${failed[@]}"; do echo "- $b"; done
          } >> "$GITHUB_STEP_SUMMARY"

          if [ ${#failed[@]} -gt 0 ]; then
            exit 1
          fi
